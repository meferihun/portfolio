# Builds the Blazor WebAssembly app and publishes the static output to GitHub Pages.
#
# One-time setup required: in the repo, go to Settings -> Pages -> Build and deployment
# -> Source, and select "GitHub Actions". After that, every push to main deploys
# automatically to https://<owner>.github.io/<repo-name>/.

name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10'
  # Must match the repo name, since GitHub Pages serves project sites under /<repo-name>/.
  BASE_HREF: '/portfolio/'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish -c Release -o publish

      - name: Fix base href for GitHub Pages subpath
        run: sed -i "s|<base href=\"/\" />|<base href=\"${{ env.BASE_HREF }}\" />|" publish/wwwroot/index.html

      - name: Add SPA fallback for client-side routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload artifact for Pages deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
